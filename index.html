<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Atlas — Neurotorium Replica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- 3D canvas fills the screen -->
  <canvas id="scene"></canvas>

  <!-- grain overlay -->
  <div class="grain" aria-hidden="true"></div>

  <!-- ====== TOP LEFT: brand ====== -->
  <header class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 40 40" width="40" height="40" aria-hidden="true">
        <g fill="none" stroke="#4a3b30" stroke-width="2.4">
          <rect x="15" y="3"  width="10" height="10"/>
          <rect x="3"  y="15" width="10" height="10"/>
          <rect x="27" y="15" width="10" height="10"/>
          <rect x="15" y="27" width="10" height="10"/>
          <path d="M20 13v6M20 21v6M13 20h6M21 20h6"/>
        </g>
      </svg>
    </div>
    <div class="brand-text">
      <div class="brand-name">neurotorium</div>
      <div class="brand-sub">Founded by the Lundbeck Foundation</div>
    </div>
  </header>

  <!-- ====== LEFT COLUMN ====== -->
  <div class="left-col">
    <!-- search -->
    <div class="search">
      <svg class="search-icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2.4"/>
        <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
      </svg>
      <input id="search-input" type="text" placeholder="Find area in the brain" autocomplete="off" />
      <div id="search-results" class="search-results"></div>
    </div>

    <!-- info card -->
    <section class="info-card" id="info-card">
      <button class="info-toggle" id="info-toggle" aria-label="Collapse">
        <svg viewBox="0 0 24 24" width="26" height="26"><path d="M6 9l6 6 6-6" fill="none" stroke="#1c1c1c" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <h1 class="info-title" id="info-title">Cerebral cortex: Prefrontal cortex</h1>
      <div class="info-body" id="info-body">
        <p class="info-desc" id="info-desc"></p>
        <div class="info-refs" id="info-refs"></div>
      </div>
    </section>

    <!-- help -->
    <button class="help-card" id="help-btn">Help &amp; Instructions</button>
  </div>

  <!-- ====== RIGHT CONTROLS ====== -->
  <div class="orient-gizmo" id="orient-gizmo" title="Orientation">
    <canvas id="gizmo-canvas"></canvas>
  </div>

  <div class="right-controls">
    <div class="zoom-row">
      <button class="round-btn" id="zoom-out" aria-label="Zoom out">
        <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="10" cy="10" r="6.5" fill="none" stroke="#1c1c1c" stroke-width="2.2"/><path d="M7 10h6M15 15l4 4" stroke="#1c1c1c" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
      <button class="round-btn" id="zoom-in" aria-label="Zoom in">
        <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="10" cy="10" r="6.5" fill="none" stroke="#1c1c1c" stroke-width="2.2"/><path d="M7 10h6M10 7v6M15 15l4 4" stroke="#1c1c1c" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="slider-row">
      <span class="slider-icon" title="Cross-section depth">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 3l9 5-9 5-9-5 9-5z" fill="none" stroke="#1c1c1c" stroke-width="1.8" stroke-linejoin="round"/><path d="M3 13l9 5 9-5" fill="none" stroke="#1c1c1c" stroke-width="1.8" stroke-linejoin="round"/></svg>
      </span>
      <input type="range" id="slider-slice" min="0" max="100" value="100" />
    </div>

    <div class="slider-row">
      <span class="slider-icon" title="Opacity">
        <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="12" r="9" fill="none" stroke="#1c1c1c" stroke-width="1.8"/><path d="M12 3a9 9 0 0 0 0 18z" fill="#1c1c1c"/></svg>
      </span>
      <input type="range" id="slider-opacity" min="15" max="100" value="100" />
    </div>

    <div class="view-group">
      <button class="view-btn active" data-view="sagittal">Sagittal</button>
      <button class="view-btn" data-view="horizontal">Horizontal</button>
      <button class="view-btn" data-view="coronal">Coronal</button>
    </div>

    <button class="screenshot-btn" id="screenshot-btn">
      <svg viewBox="0 0 24 24" width="22" height="22"><rect x="3" y="6" width="18" height="14" rx="2" fill="none" stroke="#1c1c1c" stroke-width="1.8"/><circle cx="12" cy="13" r="3.2" fill="none" stroke="#1c1c1c" stroke-width="1.8"/><path d="M8 6l1.5-2h5L16 6" fill="none" stroke="#1c1c1c" stroke-width="1.8" stroke-linejoin="round"/></svg>
      Download screenshot
    </button>
  </div>

  <!-- ====== ASK NEUROTORIUM ====== -->
  <div class="ask">
    <button class="ask-bubble" id="ask-bubble">Ask Neurotorium</button>
    <button class="ask-avatar" id="ask-avatar" aria-label="Ask Neurotorium">
      <svg viewBox="0 0 24 24" width="26" height="26"><path d="M4 5h16v11H8l-4 4z" fill="#efe9dd"/></svg>
    </button>
  </div>

  <!-- ask panel -->
  <div class="ask-panel" id="ask-panel" hidden>
    <div class="ask-panel-head">
      <span>Ask Neurotorium</span>
      <button id="ask-close" aria-label="Close">&times;</button>
    </div>
    <div class="ask-panel-body" id="ask-body"></div>
    <form class="ask-panel-input" id="ask-form">
      <input id="ask-input" type="text" placeholder="Ask about a brain region…" autocomplete="off"/>
      <button type="submit">Send</button>
    </form>
  </div>

  <!-- loading -->
  <div class="loader" id="loader"><div class="loader-spin"></div><span>Loading brain…</span></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
