<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cannabis THC and CBD impact Infographic</title>
  <meta name="description" content="Interactive 3D brain infographic showing how cannabis (THC and CBD) affects different brain regions." />
  <meta property="og:title" content="Cannabis THC and CBD impact Infographic" />
  <meta property="og:description" content="Interactive 3D brain infographic showing how cannabis (THC and CBD) affects different brain regions." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Cannabis THC and CBD impact Infographic" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- 3D canvas fills the screen -->
  <canvas id="scene"></canvas>

  <!-- grain overlay -->
  <div class="grain" aria-hidden="true"></div>

  <!-- ====== TOP LEFT: page title ====== -->
  <h1 class="page-title">Cannabis THC and CBD impact Infographic</h1>

  <!-- ====== LEFT COLUMN ====== -->
  <div class="left-col">
    <!-- search -->
    <div class="search">
      <svg class="search-icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2.4"/>
        <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
      </svg>
      <input id="search-input" type="text" placeholder="Find area in the brain" autocomplete="off" />
      <div id="search-results" class="search-results"></div>
    </div>

    <!-- info card -->
    <section class="info-card" id="info-card">
      <button class="info-toggle" id="info-toggle" aria-label="Collapse">
        <svg viewBox="0 0 24 24" width="26" height="26"><path d="M6 9l6 6 6-6" fill="none" stroke="#1c1c1c" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <h1 class="info-title" id="info-title">Prefrontal Cortex</h1>
      <p class="info-sub" id="info-sub"></p>
      <div class="info-body" id="info-body">
        <div id="info-sections"></div>
      </div>
    </section>

    <!-- help -->
    <button class="help-card" id="help-btn">Help &amp; Instructions</button>
  </div>

  <!-- ====== RIGHT CONTROLS ====== -->
  <div class="orient-gizmo" id="orient-gizmo" title="Orientation">
    <canvas id="gizmo-canvas"></canvas>
  </div>

  <div class="right-controls">
    <div class="zoom-row">
      <button class="round-btn" id="zoom-out" aria-label="Zoom out">
        <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="10" cy="10" r="6.5" fill="none" stroke="#1c1c1c" stroke-width="2.2"/><path d="M7 10h6M15 15l4 4" stroke="#1c1c1c" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
      <button class="round-btn" id="zoom-in" aria-label="Zoom in">
        <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="10" cy="10" r="6.5" fill="none" stroke="#1c1c1c" stroke-width="2.2"/><path d="M7 10h6M10 7v6M15 15l4 4" stroke="#1c1c1c" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="slider-row">
      <span class="slider-icon" title="Cross-section depth">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 3l9 5-9 5-9-5 9-5z" fill="none" stroke="#1c1c1c" stroke-width="1.8" stroke-linejoin="round"/><path d="M3 13l9 5 9-5" fill="none" stroke="#1c1c1c" stroke-width="1.8" stroke-linejoin="round"/></svg>
      </span>
      <input type="range" id="slider-slice" min="0" max="100" value="100" />
    </div>

    <div class="slider-row">
      <span class="slider-icon" title="Opacity">
        <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="12" r="9" fill="none" stroke="#1c1c1c" stroke-width="1.8"/><path d="M12 3a9 9 0 0 0 0 18z" fill="#1c1c1c"/></svg>
      </span>
      <input type="range" id="slider-opacity" min="15" max="100" value="100" />
    </div>

    <div class="view-group">
      <button class="view-btn active" data-view="sagittal">Sagittal</button>
      <button class="view-btn" data-view="horizontal">Horizontal</button>
      <button class="view-btn" data-view="coronal">Coronal</button>
    </div>

  </div>

  <!-- loading -->
  <div class="loader" id="loader"><div class="loader-spin"></div><span>Loading brain…</span></div>

  <!-- custom cursor -->
  <div class="cursor-ring" id="cursor-ring"></div>
  <div class="cursor-dot" id="cursor-dot"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
